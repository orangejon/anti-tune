<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anti-Tune</title>
    <script type="module" crossorigin src="/anti-tune/assets/index-IFCbr_dK.js"></script>
    <link rel="stylesheet" crossorigin href="/anti-tune/assets/index-BXjKi1L4.css">
  </head>
  <body>
    <main>
      <h1>Anti-Tune</h1>
      <p class="sub">Pitch de-correction for ear training. <strong>Headphones required.</strong></p>

      <div class="layout">
        <div class="col-left">
          <section class="row">
            <button id="start-btn">Start</button>
            <button id="stop-btn" disabled>Stop</button>
          </section>

          <section class="panel">
            <label>
              Exaggeration: <span id="amount-val">1.005</span>×
              <input id="amount" type="range" min="1" max="1.005" value="1.005" step="0.0001" />
            </label>

            <label>
              Output volume: <span id="volume-val">80</span>%
              <input id="volume" type="range" min="0" max="100" value="80" step="1" />
            </label>

            <label>
              Output:
              <select id="output-mode">
                <option value="osc-triangle">Oscillator (triangle)</option>
                <option value="osc-sine">Oscillator (sine)</option>
                <option value="osc-square">Oscillator (square)</option>
                <option value="osc-sawtooth">Oscillator (sawtooth)</option>
                <option value="mic">Mic (pitch-shifted)</option>
                <option value="both-triangle">Both (triangle)</option>
                <option value="both-sawtooth">Both (sawtooth)</option>
              </select>
            </label>

            <label>
              Scale:
              <select id="scale">
                <option value="chromatic">Chromatic</option>
                <option value="major">Major (C)</option>
                <option value="minor">Minor (A)</option>
              </select>
            </label>

            <label class="inline">
              <input id="bypass" type="checkbox" /> Bypass (dry)
            </label>
          </section>

          <section class="display">
            <div class="note" id="note-display">—</div>
            <div class="meter">
              <div class="meter-track">
                <div class="meter-tick center"></div>
                <div class="meter-needle" id="meter-needle"></div>
              </div>
              <div class="cents" id="cents-display">0¢</div>
            </div>
          </section>

        </div>

        <div class="col-right">
          <section class="panel">
            <h2>Scale exercise</h2>
            <div class="row">
              <label>
                Key:
                <select id="ex-key">
                  <option value="0">C</option>
                  <option value="1">C#</option>
                  <option value="2">D</option>
                  <option value="3">D#</option>
                  <option value="4">E</option>
                  <option value="5">F</option>
                  <option value="6">F#</option>
                  <option value="7">G</option>
                  <option value="8">G#</option>
                  <option value="9" selected>A</option>
                  <option value="10">A#</option>
                  <option value="11">B</option>
                </select>
              </label>
              <label>
                Scale:
                <select id="ex-type">
                  <option value="major">Major</option>
                  <option value="minor">Minor</option>
                </select>
              </label>
              <label>
                Octave:
                <select id="ex-octave">
                  <option value="3">3</option>
                  <option value="4" selected>4</option>
                  <option value="5">5</option>
                </select>
              </label>
            </div>
            <label>
              Pitch tolerance: <span id="ex-tolerance-val">8</span>¢
              <input id="ex-tolerance" type="range" min="1" max="30" value="8" step="1" />
            </label>
            <label>
              Hold duration: <span id="ex-hold-val">400</span>ms
              <input id="ex-hold" type="range" min="100" max="2000" value="400" step="100" />
            </label>
            <div class="row">
              <button id="ex-start">Start scale</button>
              <button id="ex-next" disabled>Next</button>
              <button id="ex-stop" disabled>Stop</button>
            </div>
            <div id="ex-display" hidden>
              <div class="display" style="margin: 0;">
                <div class="note" id="ex-note">—</div>
                <div class="ex-progress" id="ex-progress"></div>
                <div class="meter" style="margin-top: 12px;">
                  <div class="meter-track">
                    <div class="meter-tick center"></div>
                    <div class="meter-needle" id="ex-needle"></div>
                  </div>
                  <div class="cents" id="ex-cents">0¢</div>
                </div>
                <div class="hold-track">
                  <div class="hold-fill" id="ex-hold-fill"></div>
                </div>
              </div>
            </div>
          </section>
          <section class="panel">
            <h2>Reference tone</h2>
            <div class="ref-controls">
              <label>
                Note:
                <select id="ref-note"></select>
              </label>
              <button id="ref-randomize">Randomize</button>
              <button id="ref-play">Play tone</button>
              <button id="ref-stop" disabled>Stop tone</button>
            </div>
          </section>
        </div>
      </div>

      <p id="status" class="status"></p>
    </main>
  </body>
</html>
